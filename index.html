<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mon Brevet">
<meta name="theme-color" content="#1F3D32">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='11' fill='%231F3D32'/%3E%3Cpolyline points='8,12.5 10.5,15 16,9' fill='none' stroke='%23EFEDE3' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Mon Brevet — DNB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--chalkboard:#1F3D32;--chalk:#EFEDE3;--paper:#EDEDE5;--surface:#fff;--ink:#1C1B19;--ink-soft:#6E6A63;--line:#DEDED2;--correction:#C1392B}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--paper);color:var(--ink);max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:30px}
.mono{font-family:'IBM Plex Mono',monospace}
.screen{display:none;padding:16px;animation:fi .2s ease}
.screen.no-pad{padding:0}
.screen.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.topbar{background:var(--chalkboard);padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:8px}
.brand span{font-family:'Archivo Expanded',sans-serif;font-weight:700;font-size:15px;color:var(--chalk)}
.streak{display:flex;align-items:baseline;gap:5px;background:rgba(239,237,227,.15);border-radius:20px;padding:5px 11px}
.streak .num{font-size:12px;color:var(--chalk);font-weight:500}
.streak .lbl{font-size:10px;color:var(--chalk);opacity:.75}
.pad{padding:16px}
h2{font-family:'Archivo Expanded',sans-serif;font-size:17px;font-weight:700;margin-bottom:4px}
.back{background:none;border:none;color:var(--ink-soft);font-size:13px;cursor:pointer;padding:0;margin-bottom:14px;display:flex;align-items:center;gap:5px;font-family:'Inter',sans-serif;font-weight:500}
.card{background:var(--surface);border-radius:12px;padding:14px;margin-bottom:10px;border:.5px solid var(--line)}
.btn{width:100%;padding:13px;border-radius:10px;border:1.5px solid currentColor;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:6px;font-family:'Inter',sans-serif;background:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.bar{background:var(--line);border-radius:5px;height:5px;overflow:hidden;margin:5px 0 3px}
.bar-f{height:100%;border-radius:5px;transition:width .5s}
.tag{display:inline-block;font-family:'Archivo Expanded',sans-serif;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.niv-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--line);background:var(--surface);font-size:12px;cursor:pointer;font-weight:500;font-family:'Inter',sans-serif}
.opt{display:block;width:100%;text-align:left;padding:11px 13px;border-radius:9px;border:1.5px solid var(--line);background:#FAFAF7;font-size:13px;margin-bottom:7px;cursor:pointer;line-height:1.5;font-family:'Inter',sans-serif}
.opt.ok{background:#EAF3DE;border-color:#639922}
.opt.ko{background:#FCEBEB;border-color:#A32D2D}
.ibx{border-radius:0 9px 9px 0;padding:10px 13px;margin:8px 0}
.ibx-lbl{font-family:'Archivo Expanded',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.ibx-tip{background:#FAEEDA;border-left:3px solid #854F0B}
.ibx-tip .ibx-lbl,.ibx-tip p{color:#854F0B}
.ibx-info{background:#E6F1FB;border-left:3px solid #185FA5}
.ibx-info .ibx-lbl,.ibx-info p{color:#185FA5}
.ibx-ok{background:#E8F8F1;border-left:3px solid #1A7A50}
.ibx-ok .ibx-lbl{color:#1A7A50}
.ibx p{font-size:13px;line-height:1.65;color:var(--ink)}
.sec-lbl{font-family:'Archivo Expanded',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin:16px 0 7px}
.chap{background:var(--surface);border-radius:0 10px 10px 0;border-left:3px solid var(--correction);padding:11px 12px;margin-bottom:8px}
.chap p{font-size:12px;font-weight:600;margin-bottom:8px;line-height:1.4;color:var(--ink)}
.mode-row{display:flex;gap:5px}
.mode-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 2px;border-radius:7px;border:1px solid var(--line);background:#FAFAF7;font-size:10px;cursor:pointer;font-weight:600;font-family:'Inter',sans-serif;color:var(--ink-soft)}
.timer{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:500}
.prog{background:var(--line);border-radius:5px;height:5px;overflow:hidden;margin-bottom:14px}
.prog-f{height:100%;border-radius:5px;transition:width 1s linear}
.exam-item{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;background:var(--surface);border-radius:9px;margin-bottom:6px;border:.5px solid var(--line);cursor:pointer;font-size:12px;font-weight:500;font-family:'Inter',sans-serif}
</style>
</head>
<body>

<div id="s-home" class="screen active no-pad">
  <div class="topbar">
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#EFEDE3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="8,12.5 10.5,15 16,9"/></svg>
      <span>Mon Brevet</span>
    </div>
    <div class="streak"><span class="num mono">3</span><span class="lbl">jours</span></div>
  </div>
  <div class="pad">
    <p style="font-size:11px;color:var(--ink-soft);margin-bottom:14px">Programme officiel complet · DNB 3ème</p>
    <div class="grid2" id="score-grid"></div>
    <p class="sec-lbl" style="color:var(--ink-soft);margin-top:0">Choisir une matière</p>
    <div class="grid2" id="mat-grid"></div>
    <div class="card">
      <p class="sec-lbl" style="color:var(--ink-soft);margin:0 0 10px">Simulation d'épreuve</p>
      <div class="grid2" id="exam-grid"></div>
    </div>
  </div>
</div>

<div id="s-mat" class="screen">
  <button class="back" onclick="show('s-home')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="14,5 7,12 14,19"/></svg>Accueil</button>
  <h2 id="mat-title"></h2>
  <p id="mat-sub" style="font-size:11px;color:var(--ink-soft);margin-bottom:12px"></p>
  <div id="niv-row" style="display:flex;gap:6px;margin-bottom:4px;flex-wrap:wrap"></div>
  <div id="chap-list"></div>
</div>

<div id="s-act" class="screen">
  <button class="back" id="act-back"></button>
  <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center" id="act-tags"></div>
  <div id="act-body"></div>
</div>

<div id="s-exam" class="screen">
  <button class="back" onclick="stopExam()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="14,5 7,12 14,19"/></svg>Quitter</button>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <h2 id="exam-title" style="font-size:15px"></h2>
    <span class="timer" id="exam-timer">00:00</span>
  </div>
  <div class="prog"><div class="prog-f" id="exam-pf"></div></div>
  <div id="exam-body"></div>
</div>

<script>
const ICONS={
book:'<rect x="4" y="4" width="16" height="16" rx="1"/><line x1="12" y1="4" x2="12" y2="20"/>',
calc:'<rect x="6" y="3" width="12" height="18" rx="2"/><line x1="8" y1="7" x2="16" y2="7"/><circle cx="9" cy="12" r="0.6"/><circle cx="12" cy="12" r="0.6"/><circle cx="15" cy="12" r="0.6"/><circle cx="9" cy="16" r="0.6"/><circle cx="12" cy="16" r="0.6"/><circle cx="15" cy="16" r="0.6"/>',
world:'<circle cx="12" cy="12" r="8"/><ellipse cx="12" cy="12" rx="3.5" ry="8"/><line x1="4" y1="12" x2="20" y2="12"/>',
sprout:'<line x1="12" y1="20" x2="12" y2="10"/><line x1="12" y1="10" x2="7" y2="6"/><line x1="12" y1="10" x2="17" y2="6"/>',
flask:'<line x1="9" y1="3" x2="15" y2="3"/><line x1="10" y1="3" x2="10" y2="9"/><line x1="14" y1="3" x2="14" y2="9"/><line x1="10" y1="9" x2="6" y2="19"/><line x1="14" y1="9" x2="18" y2="19"/><line x1="6" y1="19" x2="18" y2="19"/><line x1="8" y1="15" x2="16" y2="15"/>',
circuit:'<circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="22"/><line x1="2" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="22" y2="12"/>',
clock:'<circle cx="12" cy="12" r="9"/><line x1="12" y1="12" x2="12" y2="7"/><line x1="12" y1="12" x2="16" y2="14"/>',
filetext:'<rect x="6" y="3" width="12" height="18" rx="1"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/>',
target:'<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1"/>',
pencil:'<line x1="4" y1="20" x2="8" y2="20"/><line x1="6" y1="20" x2="20" y2="6"/><line x1="16" y1="2" x2="20" y2="6"/>',
chevleft:'<polyline points="14,5 7,12 14,19"/>',
arrowright:'<line x1="4" y1="12" x2="18" y2="12"/><polyline points="13,7 18,12 13,17"/>',
message:'<rect x="3" y="4" width="18" height="13" rx="2"/><polyline points="8,17 8,21 12,17"/>',
clipboard:'<rect x="6" y="4" width="12" height="17" rx="1"/><rect x="9" y="2" width="6" height="3" rx="1"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="15" y2="14"/>',
bulb:'<circle cx="12" cy="10" r="6"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="10" y1="17" x2="10" y2="20"/><line x1="14" y1="17" x2="14" y2="20"/><line x1="10" y1="17" x2="14" y2="17"/>',
alert:'<polygon points="12,3 22,20 2,20"/><line x1="12" y1="9" x2="12" y2="13.5"/><line x1="12" y1="16.6" x2="12" y2="16.8"/>',
check:'<circle cx="12" cy="12" r="9"/><polyline points="8,12 11,15 16,9"/>'
};
function ic(name,size,color){
  size=size||16;color=color||'currentColor';
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+(ICONS[name]||'')+'</svg>';
}

const M=[
  {k:"fr",l:"Français",ic:"book",c:"#185FA5",bg:"#E6F1FB",s:[
    {t:"Étude de la langue",ch:["Grammaire & syntaxe","Conjugaison & modes verbaux","Orthographe grammaticale","Vocabulaire & lexique"]},
    {t:"Lecture & Littérature",ch:["Lecture & compréhension","Figures de style","Genres littéraires"]},
    {t:"Écriture",ch:["Rédaction narrative","Argumentation","Réécriture de texte"]},
    {t:"Épreuve",ch:["Dictée préparée","Expression orale"]}
  ]},
  {k:"ma",l:"Maths",ic:"calc",c:"#0F6E56",bg:"#E1F5EE",s:[
    {t:"Nombres & Calcul",ch:["Fractions & calcul numérique","Puissances","Identités remarquables"]},
    {t:"Algèbre",ch:["Équations du 1er degré","Systèmes d'équations","Inéquations"]},
    {t:"Géométrie",ch:["Pythagore & Thalès","Trigonométrie","Géométrie dans l'espace"]},
    {t:"Fonctions & Algo",ch:["Fonctions linéaires & affines","Probabilités & stats","Algorithmique"]}
  ]},
  {k:"hg",l:"Histoire-Géo & EMC",ic:"world",c:"#993C1D",bg:"#FAECE7",s:[
    {t:"Guerres & totalitarismes",ch:["1ère Guerre Mondiale","Régimes totalitaires","2ème Guerre Mondiale","Vichy & Résistance"]},
    {t:"Monde depuis 1945",ch:["Guerre froide","Décolonisation","Construction européenne","Géopolitique actuelle"]},
    {t:"La République",ch:["Refondation 1944-1947","Ve République","Évolutions sociales"]},
    {t:"Géographie",ch:["Espaces productifs français","Villes & urbanisation","France & mondialisation","Développement durable"]},
    {t:"EMC",ch:["Démocratie & droits","Valeurs républicaines"]}
  ]},
  {k:"sv",l:"SVT",ic:"sprout",c:"#534AB7",bg:"#EEEDFE",s:[
    {t:"Vivant & santé",ch:["Le vivant & évolution","Corps humain & santé","Génétique & reproduction"]},
    {t:"Environnement",ch:["Écosystèmes & biodiversité","Géologie & tectonique","Microorganismes & immunité"]}
  ]},
  {k:"pc",l:"Physique-Chimie",ic:"flask",c:"#B5590A",bg:"#FEF3E8",s:[
    {t:"Matière",ch:["Atomes & molécules","Réactions chimiques","Acides & bases"]},
    {t:"Forces & Mouvements",ch:["Description du mouvement","Forces & interactions","Lois de Newton"]},
    {t:"Énergie",ch:["Formes d'énergie","Énergie électrique","Enjeux énergétiques"]},
    {t:"Ondes",ch:["Lumière & optique","Signaux sonores"]}
  ]},
  {k:"te",l:"Technologie",ic:"circuit",c:"#2E6B5E",bg:"#E4F4F1",s:[
    {t:"Objets techniques",ch:["Analyse des objets techniques","Matériaux & choix","Mécanismes & transmission"]},
    {t:"Numérique",ch:["Chaîne d'information","Programmation appliquée","Réseaux & données"]},
    {t:"Énergie & Durabilité",ch:["Chaîne d'énergie","Éco-conception"]}
  ]}
];

const NV=["Débutant","Intermédiaire","Expert"];
let cMat=null,cChap=null,cNiv=1,cMod=null;
let examInt=null,examDur=0,examTl=0;
const scores={fr:0,ma:0,hg:0,sv:0,pc:0,te:0};
const gm=k=>M.find(m=>m.k===k);
const ach=k=>gm(k).s.flatMap(s=>s.ch);
const esc=s=>(s||"").replace(/'/g,"\\'");

function buildSys(mat,chap,niv,mod){
  const b=`Professeur DNB expert en ${mat}. Niveau ${niv}. RÉPONDS UNIQUEMENT EN JSON VALIDE, sans markdown ni texte avant/après.`;
  if(mod==="fiche") return b+` Fiche de révision sur "${chap}": {"titre":"...","points":["...","...","..."],"astuce":"..."}`;
  if(mod==="quiz")  return b+` QCM sur "${chap}": {"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"reponse":"A","explication":"..."}`;
  return b+` Exercice type brevet sur "${chap}": {"consigne":"...","question":"...","correction":"...","conseil":"..."}`;
}

function parseJ(txt){
  try{
    let c=txt.replace(/```json|```/gi,"").trim();
    const s=c.indexOf("{"),e=c.lastIndexOf("}");
    if(s<0||e<0)return null;
    return JSON.parse(c.slice(s,e+1));
  }catch{return null;}
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  if(id==='s-home')initHome();
}

function initHome(){
  document.getElementById('score-grid').innerHTML=M.map(m=>`
    <div class="card" style="padding:10px">
      <div style="margin-bottom:5px">${ic(m.ic,18,m.c)}</div>
      <div style="font-family:'Archivo Expanded',sans-serif;font-size:11px;font-weight:700;color:${m.c};line-height:1.3;margin-bottom:4px">${m.l}</div>
      <div class="bar"><div class="bar-f" style="width:${scores[m.k]}%;background:${m.c}"></div></div>
      <div class="mono" style="font-size:10px;color:var(--ink-soft)">${scores[m.k]}%</div>
    </div>`).join('');
  document.getElementById('mat-grid').innerHTML=M.map(m=>`
    <button onclick="openMat('${m.k}')" style="background:${m.bg};border:none;border-radius:12px;padding:13px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:9px">
      <span style="color:${m.c}">${ic(m.ic,22,m.c)}</span>
      <div><div style="font-family:'Archivo Expanded',sans-serif;font-weight:700;color:${m.c};font-size:12px;line-height:1.3">${m.l}</div><div class="mono" style="font-size:10px;color:${m.c};opacity:.75;margin-top:2px">${ach(m.k).length} chapitres</div></div>
    </button>`).join('');
  document.getElementById('exam-grid').innerHTML=M.map(m=>`
    <button onclick="startExam('${m.k}')" style="background:var(--surface);border:.5px solid var(--line);border-radius:9px;padding:9px 6px;cursor:pointer;font-size:11px;font-weight:600;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--ink)">${ic(m.ic,14,m.c)}${m.l}</button>`).join('');
}

function openMat(k){
  cMat=k;
  const m=gm(k);
  document.getElementById('mat-title').innerHTML=`<span style="display:flex;align-items:center;gap:8px">${ic(m.ic,18,m.c)}${m.l}</span>`;
  document.getElementById('mat-sub').innerHTML=`<span class="mono">${ach(k).length}</span> chapitres · Programme officiel DNB`;
  document.getElementById('niv-row').innerHTML=NV.map((n,i)=>`
    <button class="niv-btn" onclick="setNiv(${i})"
      style="color:${cNiv===i?m.c:'var(--ink-soft)'};border-color:${cNiv===i?m.c:'var(--line)'};background:${cNiv===i?m.bg:'var(--surface)'};font-weight:${cNiv===i?700:500}">${n}</button>`).join('');
  document.getElementById('chap-list').innerHTML=m.s.map(sec=>`
    <p class="sec-lbl" style="color:${m.c}">${sec.t}</p>
    ${sec.ch.map(ch=>`
      <div class="chap">
        <p>${ch}</p>
        <div class="mode-row">
          <button class="mode-btn" onclick="openAct('${m.k}','${esc(ch)}','fiche')">${ic('filetext',15)}<span>Fiche</span></button>
          <button class="mode-btn" onclick="openAct('${m.k}','${esc(ch)}','quiz')">${ic('target',15)}<span>Quiz</span></button>
          <button class="mode-btn" onclick="openAct('${m.k}','${esc(ch)}','exercice')">${ic('pencil',15)}<span>Exo</span></button>
        </div>
      </div>`).join('')}`).join('');
  show('s-mat');
}

function setNiv(i){cNiv=i;openMat(cMat);}

function openAct(k,ch,mod){
  cMat=k;cChap=ch;cMod=mod;
  const m=gm(k);
  document.getElementById('act-back').innerHTML=ic('chevleft',13)+m.l;
  document.getElementById('act-back').onclick=()=>show('s-mat');
  const modLbl=mod==='fiche'?'Fiche':mod==='quiz'?'Quiz':'Exercice';
  document.getElementById('act-tags').innerHTML=`
    <span class="tag" style="background:${m.bg};color:${m.c}">${ch}</span>
    <span style="font-size:11px;color:var(--ink-soft)">· ${NV[cNiv]} · ${modLbl}</span>`;
  document.getElementById('act-body').innerHTML=`<div style="text-align:center;padding:40px">${ic('clock',30,'var(--ink-soft)')}<p style="color:var(--ink-soft);margin-top:10px;font-size:13px">L'IA génère ton contenu…</p></div>`;
  show('s-act');
  callAPI(k,ch,cNiv,mod);
}

async function callAPI(k,ch,ni,mod,retry=0){
  const m=gm(k);
  try{
    const r=await fetch("/.netlify/functions/claude",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:buildSys(m.l,ch,NV[ni],mod)})
    });
    if(!r.ok)throw new Error("HTTP "+r.status);
    const d=await r.json();
    const txt=d.content?.find(b=>b.type==="text")?.text||"";
    const p=parseJ(txt);
    if(!p){if(retry<1){callAPI(k,ch,ni,mod,1);return;}throw new Error("JSON invalide");}
    renderAct(mod,m,k,ch,p);
  }catch(e){
    if(retry<1){callAPI(k,ch,ni,mod,1);return;}
    document.getElementById('act-body').innerHTML=`
      <div class="ibx ibx-info" style="border-left-color:var(--correction);background:#FCEBEB;text-align:center;border-radius:10px">
        <p class="ibx-lbl" style="color:var(--correction);justify-content:center">${ic('alert',14,'var(--correction)')}Erreur de chargement</p>
        <p style="font-size:12px;color:var(--ink-soft);margin-bottom:10px">Vérifie ta connexion internet</p>
        <button class="btn" style="background:var(--correction);color:#fff;border-color:var(--correction)" onclick="openAct('${k}','${esc(ch)}','${mod}')">Réessayer</button>
      </div>`;
  }
}

function renderAct(mod,m,k,ch,d){
  if(mod==="fiche"){
    document.getElementById('act-body').innerHTML=`
      <div class="card">
        <p style="font-family:'Archivo Expanded',sans-serif;font-weight:700;color:${m.c};font-size:15px;margin-bottom:14px">${d.titre||ch}</p>
        ${(d.points||[]).map((p,i)=>`
          <div style="display:flex;gap:9px;margin-bottom:11px">
            <span class="mono" style="background:${m.bg};color:${m.c};min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">${i+1}</span>
            <p style="font-size:13px;line-height:1.65">${p}</p>
          </div>`).join('')}
        ${d.astuce?`<div class="ibx ibx-tip"><p class="ibx-lbl">${ic('bulb',13,'#854F0B')}Astuce brevet</p><p>${d.astuce}</p></div>`:''}
        <button class="btn" style="background:${m.bg};color:${m.c}" onclick="openAct('${k}','${esc(ch)}','fiche')">Nouvelle fiche${ic('arrowright',14)}</button>
      </div>`;
  }else if(mod==="quiz"){
    document.getElementById('act-body').innerHTML=`
      <div class="card">
        <p style="font-size:14px;font-weight:600;line-height:1.65;margin-bottom:14px">${d.question||""}</p>
        <div id="opts">
          ${(d.options||[]).map(o=>`<button class="opt" onclick="ansQ(this,'${o[0]}','${d.reponse?.[0]||'A'}')">${o}</button>`).join('')}
        </div>
        <div id="qexpl" style="display:none">
          <div class="ibx ibx-info"><p class="ibx-lbl">${ic('message',13,'#185FA5')}Explication</p><p>${d.explication||""}</p></div>
          <button class="btn" style="background:${m.bg};color:${m.c}" onclick="openAct('${k}','${esc(ch)}','quiz')">Question suivante${ic('arrowright',14)}</button>
        </div>
      </div>`;
  }else{
    document.getElementById('act-body').innerHTML=`
      <div class="card" id="exo-card">
        ${d.consigne?`<p style="font-family:'Archivo Expanded',sans-serif;font-weight:700;font-size:13px;margin-bottom:9px;display:flex;align-items:center;gap:6px">${ic('clipboard',14,m.c)}${d.consigne}</p>`:''}
        ${d.question?`<p style="font-size:13px;line-height:1.65;margin-bottom:14px">${d.question}</p>`:''}
        <button class="btn" style="background:${m.bg};color:${m.c}" onclick="revExo('${esc(d.correction||'')}','${esc(d.conseil||'')}','${k}','${esc(ch)}')">Voir la correction</button>
      </div>`;
  }
}

function ansQ(btn,sel,rep){
  document.querySelectorAll('.opt').forEach(b=>{
    const l=b.textContent.trim()[0];
    b.classList.remove('ok','ko');
    if(l===rep)b.classList.add('ok');
    else if(l===sel)b.classList.add('ko');
    b.onclick=null;
  });
  document.getElementById('qexpl').style.display='block';
  if(sel===rep)scores[cMat]=Math.min(100,scores[cMat]+3);
}

function revExo(corr,conseil,k,ch){
  const card=document.getElementById('exo-card');
  const btn=card.querySelector('button');
  btn.insertAdjacentHTML('beforebegin',`
    <div class="ibx ibx-ok"><p class="ibx-lbl">${ic('check',13,'#1A7A50')}Correction</p><p>${corr}</p></div>
    ${conseil?`<div class="ibx ibx-tip"><p class="ibx-lbl">${ic('bulb',13,'#854F0B')}Conseil</p><p>${conseil}</p></div>`:''}`);
  btn.innerHTML="Exercice suivant"+ic('arrowright',14);
  btn.onclick=()=>openAct(k,ch,'exercice');
}

function startExam(k){
  cMat=k;
  const m=gm(k);
  examDur=k==="ma"?120:k==="hg"?120:90;
  examTl=examDur*60;
  document.getElementById('exam-title').textContent=`${m.l} — ${examDur} min`;
  updateExamTimer(m);
  document.getElementById('exam-body').innerHTML=ach(k).map(ch=>`
    <div class="exam-item" onclick="openAct('${k}','${esc(ch)}','exercice')">
      <span>${ch}</span><span style="color:${m.c}">${ic('arrowright',15,m.c)}</span>
    </div>`).join('');
  clearInterval(examInt);
  examInt=setInterval(()=>{
    examTl--;
    updateExamTimer(gm(cMat));
    if(examTl<=0){
      clearInterval(examInt);
      const m2=gm(cMat);
      document.getElementById('exam-body').innerHTML=`
        <div style="text-align:center;padding:40px 16px">
          <div style="color:${m2.c};margin-bottom:14px">${ic('check',44,m2.c)}</div>
          <p style="font-family:'Archivo Expanded',sans-serif;font-size:17px;font-weight:700;margin-bottom:6px">Temps écoulé !</p>
          <button class="btn" style="background:${m2.c};color:#fff;border-color:${m2.c}" onclick="show('s-home')">Retour à l'accueil</button>
        </div>`;
    }
  },1000);
  show('s-exam');
}

function updateExamTimer(m){
  const mm=Math.floor(examTl/60),ss=examTl%60;
  const t=document.getElementById('exam-timer');
  t.textContent=`${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
  t.style.color=examTl<600?"var(--correction)":m.c;
  const pct=Math.round((examTl/(examDur*60))*100);
  const pf=document.getElementById('exam-pf');
  pf.style.width=pct+"%";
  pf.style.background=examTl<600?"var(--correction)":m.c;
}

function stopExam(){clearInterval(examInt);show('s-home');}

initHome();
</script>
</body>
</html>
